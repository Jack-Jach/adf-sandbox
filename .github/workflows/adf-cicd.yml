name: ADF CI/CD

on:
  push:
    branches:
      - dev
      - test
      - main

env:
  RESOURCE_GROUP: "Sandbox"
  BUILD_ARTIFACT: "ADF_ARM_Templates"

jobs:
  # ──────────────────────────────────────
  # CI - Validate & Build
  # ──────────────────────────────────────
  validate-and-build:
    runs-on: ubuntu-latest

    env:
      ADF_ID: ${{ (github.ref_name == 'main' && 'prod-scc-adf') || (github.ref_name == 'test' && 'test-acc-adf') || 'dev-scc-adf' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install ADF utilities
        run: npm install

      - name: Validate
        run: npm run build validate ${{github.workspace}}/adf /subscriptions/${{secrets.AZURE_SUBSCRIPTION_ID}}/resourceGroups/${{env.RESOURCE_GROUP}}/providers/Microsoft.DataFactory/factories/${{env.ADF_ID}}

      - name: Generate ARM template
        run: npm run build export ${{github.workspace}}/adf /subscriptions/${{secrets.AZURE_SUBSCRIPTION_ID}}/resourceGroups/${{env.RESOURCE_GROUP}}/providers/Microsoft.DataFactory/factories/${{env.ADF_ID}} "ExportedArmTemplate"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_ARTIFACT }}
          path: ExportedArmTemplate/

  # ──────────────────────────────────────
  # CD - Deploy dev/test
  # ──────────────────────────────────────
  deploy:
    name: Deploy (${{ github.ref_name }})
    if: ${{ github.ref_name == 'dev' || github.ref_name == 'test' }}
    needs: validate-and-build
    runs-on: ubuntu-latest

    env:
      ADF_ID: ${{ (github.ref_name == 'test' && 'test-acc-adf') || 'dev-scc-adf' }}
      PARAMETER_FILE: ${{ (github.ref_name == 'test' && 'adf/parameters/test.parameters.json') || 'adf/parameters/dev.parameters.json' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download ARM template
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BUILD_ARTIFACT }}
          path: arm-output/

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'
          enable-AzPSSession: true

      - name: Stop ADF triggers
        uses: azure/powershell@v2
        with:
          inlineScript: |
            $triggers = Get-AzDataFactoryV2Trigger -ResourceGroupName "${{ env.RESOURCE_GROUP }}" -DataFactoryName "${{ env.ADF_ID }}"
            $triggers | ForEach-Object {
              Stop-AzDataFactoryV2Trigger -ResourceGroupName "${{ env.RESOURCE_GROUP }}" -DataFactoryName "${{ env.ADF_ID }}" -Name $_.Name -Force
            }
          azPSVersion: latest

      - name: Deploy to ${{ github.ref_name }} ADF
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: arm-output/ARMTemplateForFactory.json
          parametersFile: ${{ env.PARAMETER_FILE }}

      - name: Start ADF triggers
        uses: azure/powershell@v2
        with:
          inlineScript: |
            $triggers = Get-AzDataFactoryV2Trigger -ResourceGroupName "${{ env.RESOURCE_GROUP }}" -DataFactoryName "${{ env.ADF_ID }}"
            $triggers | ForEach-Object {
              Start-AzDataFactoryV2Trigger -ResourceGroupName "${{ env.RESOURCE_GROUP }}" -DataFactoryName "${{ env.ADF_ID }}" -Name $_.Name -Force
            }
          azPSVersion: latest

  # ──────────────────────────────────────
  # CD - Deploy prod (with approval)
  # ──────────────────────────────────────
  deploy-prod:
    if: ${{ github.ref_name == 'main' }}
    needs: validate-and-build
    runs-on: ubuntu-latest
    environment: production

    env:
      ADF_ID: "prod-acc-adf"
      PARAMETER_FILE: "adf/parameters/prod.parameters.json"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download ARM template
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BUILD_ARTIFACT }}
          path: arm-output/

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'
          enable-AzPSSession: true

      - name: Stop ADF triggers
        uses: azure/powershell@v2
        with:
          inlineScript: |
            $triggers = Get-AzDataFactoryV2Trigger -ResourceGroupName "${{ env.RESOURCE_GROUP }}" -DataFactoryName "${{ env.ADF_ID }}"
            $triggers | ForEach-Object {
              Stop-AzDataFactoryV2Trigger -ResourceGroupName "${{ env.RESOURCE_GROUP }}" -DataFactoryName "${{ env.ADF_ID }}" -Name $_.Name -Force
            }
          azPSVersion: latest

      - name: Deploy to prod ADF
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: arm-output/ARMTemplateForFactory.json
          parametersFile: ${{ env.PARAMETER_FILE }}

      - name: Start ADF triggers
        uses: azure/powershell@v2
        with:
          inlineScript: |
            $triggers = Get-AzDataFactoryV2Trigger -ResourceGroupName "${{ env.RESOURCE_GROUP }}" -DataFactoryName "${{ env.ADF_ID }}"
            $triggers | ForEach-Object {
              Start-AzDataFactoryV2Trigger -ResourceGroupName "${{ env.RESOURCE_GROUP }}" -DataFactoryName "${{ env.ADF_ID }}" -Name $_.Name -Force
            }
          azPSVersion: latest
