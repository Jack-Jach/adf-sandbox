name: ADF CI/CD

on:
  push:
    branches:
      - dev
      - test
      - main

env:
  RESOURCE_GROUP: "Sandbox"
  BUILD_ARTIFACT: "ADF_ARM_Templates"
  # Use your Dev ADF for the Build/Export process
  DEV_ADF_NAME: "dev-scc-adf" 

permissions:
  id-token: write
  contents: read

jobs:
  # ──────────────────────────────────────
  # CI - Validate & Build
  # ──────────────────────────────────────
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install ADF utilities
        run: |
          if [ ! -f package.json ]; then
            echo '{"dependencies": {"@microsoft/azure-data-factory-utilities": "^1.0.0"}}' > package.json
          fi
          npm install

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true

      - name: Validate & Export ARM Template
        run: |
          # 1. Validate
          node node_modules/@microsoft/azure-data-factory-utilities/lib/index validate \
            ${{ github.workspace }}/adf \
            /subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ env.RESOURCE_GROUP }}/providers/Microsoft.DataFactory/factories/${{ env.DEV_ADF_NAME }}
          
          # 2. Export
          node node_modules/@microsoft/azure-data-factory-utilities/lib/index export \
            ${{ github.workspace }}/adf \
            /subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ env.RESOURCE_GROUP }}/providers/Microsoft.DataFactory/factories/${{ env.DEV_ADF_NAME }} \
            "ExportedArmTemplate"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_ARTIFACT }}
          path: ExportedArmTemplate/

  # ──────────────────────────────────────
  # CD - Deploy (Dev, Test, or Prod)
  # ──────────────────────────────────────
  deploy:
    needs: validate-and-build
    runs-on: ubuntu-latest
    
    # Maps branch to GitHub Environment (allows for manual approval on 'production')
    environment:
      name: ${{ (github.ref_name == 'main' && 'production') || (github.ref_name == 'test' && 'test') || 'development' }}

    env:
      # Map the correct ADF Name based on the branch
      TARGET_ADF_NAME: ${{ (github.ref_name == 'main' && 'prod-scc-adf') || (github.ref_name == 'test' && 'test-acc-adf') || 'dev-scc-adf' }}

    steps:
      - name: Download ARM template
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BUILD_ARTIFACT }}
          path: arm-output/

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          enable-AzPSSession: true

      - name: Stop ADF triggers
        uses: azure/powershell@v2
        with:
          inlineScript: |
            $triggers = Get-AzDataFactoryV2Trigger -ResourceGroupName "${{ env.RESOURCE_GROUP }}" -DataFactoryName "${{ env.TARGET_ADF_NAME }}" -ErrorAction SilentlyContinue
            if ($triggers) {
                $triggers | ForEach-Object {
                    Stop-AzDataFactoryV2Trigger -ResourceGroupName "${{ env.RESOURCE_GROUP }}" -DataFactoryName "${{ env.TARGET_ADF_NAME }}" -Name $_.Name -Force
                }
            }
          azPSVersion: latest

      - name: Deploy ARM Template
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          # Use the template generated by the Build job
          template: arm-output/ARMTemplateForFactory.json
          # Use the parameter file generated by the Build job
          parameters: arm-output/ARMTemplateParametersForFactory.json
          # OVERRIDE the Factory Name to match the current environment
          overrideParameters: >
            factoryName=${{ env.TARGET_ADF_NAME }}
          failOnStdErr: false

      - name: Start ADF triggers
        uses: azure/powershell@v2
        with:
          inlineScript: |
            $triggers = Get-AzDataFactoryV2Trigger -ResourceGroupName "${{ env.RESOURCE_GROUP }}" -DataFactoryName "${{ env.TARGET_ADF_NAME }}" -ErrorAction SilentlyContinue
            if ($triggers) {
                $triggers | ForEach-Object {
                    Start-AzDataFactoryV2Trigger -ResourceGroupName "${{ env.RESOURCE_GROUP }}" -DataFactoryName "${{ env.TARGET_ADF_NAME }}" -Name $_.Name -Force
                }
            }
          azPSVersion: latest